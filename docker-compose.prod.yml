services:
  api:
    image: ghcr.io/parsace/nodeops:latest
    restart: always
    environment:
      - NODE_ENV=production
    env_file:
      - .env.prod
    depends_on:
      - db
      - cache

  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M

  cache:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
